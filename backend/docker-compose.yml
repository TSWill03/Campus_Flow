services:
  api:
    build: .
    container_name: campus-flow-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3333
      DATABASE_URL: postgresql://campus_flow:campus_flow@postgres:5432/campus_flow?schema=public
      JWT_SECRET: campus-flow-local-docker-secret-change-me-32
      ACCESS_TOKEN_TTL_SECONDS: 900
      REFRESH_TOKEN_DAYS: 30
      CORS_ORIGIN: http://localhost:*,http://127.0.0.1:*,http://[::1]:*
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_IDS: ""
      STORAGE_DIR: /app/storage/uploads
    ports:
      - "3333:3333"
    volumes:
      - campus_flow_storage:/app/storage/uploads
    command: ["sh", "-c", "npx prisma db push && node dist/server.js"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3333/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17-alpine
    container_name: campus-flow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: campus_flow
      POSTGRES_USER: campus_flow
      POSTGRES_PASSWORD: campus_flow
    ports:
      - "5432:5432"
    volumes:
      - campus_flow_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus_flow -d campus_flow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  campus_flow_postgres:
  campus_flow_storage:
